      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
  </defs>
  <rect width="860" height="220" rx="20" fill="url(#tlBg)"/>
  <text x="430" y="42" text-anchor="middle" font-family="Verdana, sans-serif" font-size="22" font-weight="700" fill="#E0F2FE">Timeline</text>

