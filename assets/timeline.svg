    <animate attributeName="stroke-dashoffset" from="0" to="-28" dur="1.4s" repeatCount="indefinite"/>
  </line>

  <g text-anchor="middle" font-family="Verdana, sans-serif">
    <circle cx="180" cy="120" r="12" fill="#1E3A8A"/>
    <circle cx="180" cy="120" r="18" fill="none" stroke="#1E3A8A" stroke-width="2" opacity="0.5"/>
    <text x="180" y="90" font-size="13" fill="#7DD3FC" font-weight="700">Past</text>
    <text x="180" y="155" font-size="11.5" fill="#93C5FD">Started B.Tech CS</text>
