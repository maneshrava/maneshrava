    <circle cx="680" cy="120" r="12" fill="#0F172A" stroke="#38BDF8" stroke-width="2"/>
    <text x="680" y="90" font-size="13" fill="#7DD3FC" font-weight="700">Future</text>
    <text x="680" y="155" font-size="11.5" fill="#93C5FD">Open source &amp; internship</text>
