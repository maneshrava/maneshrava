<svg width="860" height="260" viewBox="0 0 860 260" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="roadBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1E3A8A"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
  </defs>
  <rect width="860" height="260" rx="20" fill="url(#roadBg)"/>
  <text x="430" y="42" text-anchor="middle" font-family="Verdana, sans-serif" font-size="22" font-weight="700" fill="#E0F2FE">Roadmap</text>

  <line x1="60" y1="140" x2="800" y2="140" stroke="#1E3A8A" stroke-width="4"/>
  <line x1="60" y1="140" x2="60" y2="140" stroke="url(#lineGrad)" stroke-width="4">
    <animate attributeName="x2" from="60" to="530" dur="2s" fill="freeze"/>
  </line>

  <g font-family="Consolas, monospace" font-size="12" fill="#7DD3FC" text-anchor="middle">
    <!-- Java: done -->
    <circle cx="100" cy="140" r="10" fill="#38BDF8"/>
    <text x="100" y="175">Java</text>
    <text x="100" y="120" fill="#7DD3FC" font-size="11">Done</text>

    <!-- DSA: in progress -->
    <circle cx="240" cy="140" r="10" fill="#38BDF8"/>
    <text x="240" y="175">DSA</text>
    <text x="240" y="120" fill="#7DD3FC" font-size="11">In progress</text>

    <!-- ML -->
    <circle cx="380" cy="140" r="10" fill="#3B82F6"/>
    <text x="380" y="175">ML</text>
    <text x="380" y="120" fill="#7DD3FC" font-size="11">Learning</text>

    <!-- Cybersecurity -->
    <circle cx="520" cy="140" r="10" fill="#1E3A8A" stroke="#38BDF8" stroke-width="2">
      <animate attributeName="fill" values="#1E3A8A;#3B82F6;#1E3A8A" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="520" y="175">Cybersecurity</text>
    <text x="520" y="120" fill="#64748B" font-size="11">Up next</text>

    <!-- Open Source -->
    <circle cx="620" cy="140" r="9" fill="#0F172A" stroke="#1E3A8A" stroke-width="2"/>
    <text x="620" y="175" fill="#64748B">Open Source</text>

    <!-- Internship -->
    <circle cx="720" cy="140" r="9" fill="#0F172A" stroke="#1E3A8A" stroke-width="2"/>
    <text x="720" y="175" fill="#64748B">Internship</text>

    <!-- Placement -->
    <circle cx="800" cy="140" r="9" fill="#0F172A" stroke="#1E3A8A" stroke-width="2"/>
    <text x="800" y="175" fill="#64748B">Placement</text>
  </g>

  <text x="430" y="230" text-anchor="middle" font-family="Verdana, sans-serif" font-size="12" fill="#64748B">Progress updates as skills are strengthened</text>
</svg>
