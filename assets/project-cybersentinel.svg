<svg width="780" height="240" viewBox="0 0 780 240" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cardBg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="stroke1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#1E3A8A" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="barGrad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1E3A8A"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
    <filter id="pBlur1"><feGaussianBlur stdDeviation="24"/></filter>
  </defs>

  <rect width="780" height="240" rx="18" fill="url(#cardBg1)"/>
  <circle cx="720" cy="30" r="110" fill="#2563EB" opacity="0.3" filter="url(#pBlur1)"/>
  <rect x="14" y="14" width="752" height="212" rx="14" fill="white" opacity="0.045" stroke="url(#stroke1)"/>

  <!-- shield icon -->
  <g transform="translate(36,34)">
    <path d="M24,4 L44,14 v18 c0,20 -13,32 -24,38 c-11,-6 -24,-18 -24,-38 v-18 z" stroke="#38BDF8" stroke-width="2.6" fill="none"/>
    <path d="M12,24 l8,8 l16,-18" stroke="#7DD3FC" stroke-width="2.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <text x="100" y="56" font-family="Verdana, sans-serif" font-size="20" font-weight="700" fill="#E0F2FE">CyberSentinel</text>
  <rect x="680" y="34" width="80" height="24" rx="12" fill="#1E3A8A" opacity="0.6"/>
  <text x="720" y="50" text-anchor="middle" font-family="Consolas, monospace" font-size="12" fill="#7DD3FC">In Progress</text>

  <text x="100" y="82" font-family="Verdana, sans-serif" font-size="13.5" fill="#BAE6FD">A cybersecurity-focused project for detecting and responding to threats.</text>

  <g font-family="Consolas, monospace" font-size="11.5">
    <rect x="100" y="98" width="60" height="22" rx="11" fill="#1E3A8A" opacity="0.55"/>
    <text x="130" y="113" text-anchor="middle" fill="#7DD3FC">Python</text>
    <rect x="168" y="98" width="80" height="22" rx="11" fill="#1E3A8A" opacity="0.55"/>
    <text x="208" y="113" text-anchor="middle" fill="#7DD3FC">Security</text>
    <rect x="256" y="98" width="90" height="22" rx="11" fill="#1E3A8A" opacity="0.55"/>
    <text x="301" y="113" text-anchor="middle" fill="#7DD3FC">Networking</text>
  </g>

  <text x="100" y="150" font-family="Verdana, sans-serif" font-size="12" fill="#7DD3FC">Progress</text>
  <rect x="100" y="158" width="580" height="10" rx="5" fill="#0F172A" stroke="#1E3A8A"/>
  <rect x="100" y="158" width="0" height="10" rx="5" fill="url(#barGrad1)">
    <animate attributeName="width" from="0" to="382" dur="1.6s" fill="freeze"/>
  </rect>
  <text x="690" y="167" font-family="Consolas, monospace" font-size="12" fill="#E0F2FE">65%</text>

  <text x="100" y="200" font-family="Consolas, monospace" font-size="12.5" fill="#38BDF8">github.com/maneshrava/CyberSentinel &#8594;</text>
</svg>
