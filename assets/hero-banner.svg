<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="35%" stop-color="#0F172A"/>
      <stop offset="70%" stop-color="#1E3A8A"/>
      <stop offset="100%" stop-color="#0F172A"/>
      <animate attributeName="x1" values="0%;100%;0%" dur="12s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="100%;0%;100%" dur="12s" repeatCount="indefinite"/>
    </linearGradient>

    <radialGradient id="glowBlue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glowCyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7DD3FC" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#7DD3FC" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E0F2FE"/>
      <stop offset="45%" stop-color="#7DD3FC"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>

    <filter id="softBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="25"/>
    </filter>

    <filter id="glowText" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <clipPath id="frame">
      <rect x="0" y="0" width="1200" height="420" rx="26"/>
    </clipPath>
  </defs>

  <g clip-path="url(#frame)">
    <rect width="1200" height="420" fill="url(#bgGrad)"/>

    <!-- floating glow blobs -->
    <circle cx="180" cy="90" r="160" fill="url(#glowBlue)" filter="url(#softBlur)">
      <animate attributeName="cy" values="90;140;90" dur="9s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1040" cy="320" r="200" fill="url(#glowCyan)" filter="url(#softBlur)">
      <animate attributeName="cy" values="320;260;320" dur="11s" repeatCount="indefinite"/>
    </circle>
    <circle cx="950" cy="70" r="120" fill="url(#glowBlue)" filter="url(#softBlur)">
      <animate attributeName="cx" values="950;900;950" dur="8s" repeatCount="indefinite"/>
    </circle>

    <!-- moving light streaks -->
    <g stroke="#7DD3FC" stroke-width="1.5" opacity="0.35">
      <line x1="-100" y1="60" x2="200" y2="-20">
        <animateTransform attributeName="transform" type="translate" values="0 0;1400 260;0 0" dur="7s" repeatCount="indefinite"/>
      </line>
      <line x1="-100" y1="180" x2="150" y2="90">
        <animateTransform attributeName="transform" type="translate" values="0 0;1400 -40;0 0" dur="9s" repeatCount="indefinite"/>
      </line>
      <line x1="-100" y1="320" x2="180" y2="250">
        <animateTransform attributeName="transform" type="translate" values="0 0;1400 90;0 0" dur="10.5s" repeatCount="indefinite"/>
      </line>
    </g>

    <!-- floating particles -->
    <g fill="#E0F2FE">
      <circle cx="120" cy="60" r="2"><animate attributeName="cy" values="60;40;60" dur="4s" repeatCount="indefinite"/></circle>
      <circle cx="260" cy="130" r="1.6"><animate attributeName="cy" values="130;100;130" dur="5s" repeatCount="indefinite"/></circle>
      <circle cx="340" cy="60" r="2.2"><animate attributeName="cy" values="60;90;60" dur="6s" repeatCount="indefinite"/></circle>
      <circle cx="880" cy="90" r="2"><animate attributeName="cy" values="90;60;90" dur="4.5s" repeatCount="indefinite"/></circle>
      <circle cx="1000" cy="150" r="1.8"><animate attributeName="cy" values="150;120;150" dur="5.5s" repeatCount="indefinite"/></circle>
      <circle cx="1100" cy="80" r="2.4"><animate attributeName="cy" values="80;110;80" dur="6.5s" repeatCount="indefinite"/></circle>
      <circle cx="60" cy="250" r="1.8"><animate attributeName="cy" values="250;220;250" dur="5s" repeatCount="indefinite"/></circle>
      <circle cx="1140" cy="260" r="2"><animate attributeName="cy" values="260;290;260" dur="6s" repeatCount="indefinite"/></circle>
    </g>

    <!-- glass reflection band -->
    <rect x="0" y="0" width="1200" height="150" fill="white" opacity="0.03"/>
    <rect x="60" y="30" width="1080" height="240" rx="24" fill="white" opacity="0.04" stroke="#7DD3FC" stroke-opacity="0.15"/>

    <!-- name -->
    <text x="600" y="205" text-anchor="middle" font-family="Verdana, Geneva, sans-serif" font-size="64" font-weight="700" fill="url(#textGrad)" filter="url(#glowText)">
      Shravani Mane
      <animate attributeName="opacity" values="0;1" dur="1.2s" fill="freeze"/>
    </text>

    <!-- subtitle typing line -->
    <text x="600" y="255" text-anchor="middle" font-family="Consolas, monospace" font-size="24" fill="#7DD3FC">
      <tspan>Java Developer&#160;&#183;&#160;DSA Learner&#160;&#183;&#160;Cybersecurity Explorer&#160;&#183;&#160;ML Enthusiast</tspan>
      <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.3;1" dur="2s" fill="freeze"/>
    </text>
    <rect x="878" y="238" width="3" height="26" fill="#7DD3FC">
      <animate attributeName="opacity" values="1;0;1" dur="0.9s" repeatCount="indefinite"/>
    </rect>

    <!-- animated waves -->
    <g opacity="0.9">
      <path fill="#1E3A8A" opacity="0.55">
        <animate attributeName="d" dur="8s" repeatCount="indefinite"
          values="M0,360 C200,330 400,390 600,360 C800,330 1000,390 1200,360 L1200,420 L0,420 Z;
                  M0,375 C200,405 400,345 600,375 C800,405 1000,345 1200,375 L1200,420 L0,420 Z;
                  M0,360 C200,330 400,390 600,360 C800,330 1000,390 1200,360 L1200,420 L0,420 Z"/>
      </path>
      <path fill="#2563EB" opacity="0.5">
        <animate attributeName="d" dur="6s" repeatCount="indefinite"
          values="M0,385 C250,360 450,410 700,385 C900,365 1050,405 1200,385 L1200,420 L0,420 Z;
                  M0,395 C250,415 450,370 700,395 C900,415 1050,370 1200,395 L1200,420 L0,420 Z;
                  M0,385 C250,360 450,410 700,385 C900,365 1050,405 1200,385 L1200,420 L0,420 Z"/>
      </path>
      <path fill="#38BDF8" opacity="0.35">
        <animate attributeName="d" dur="5s" repeatCount="indefinite"
          values="M0,405 C300,390 500,415 800,400 C950,392 1100,412 1200,405 L1200,420 L0,420 Z;
                  M0,412 C300,400 500,395 800,412 C950,418 1100,398 1200,412 L1200,420 L0,420 Z;
                  M0,405 C300,390 500,415 800,400 C950,392 1100,412 1200,405 L1200,420 L0,420 Z"/>
      </path>
    </g>

    <rect x="0" y="0" width="1200" height="420" rx="26" fill="none" stroke="#3B82F6" stroke-opacity="0.35"/>
  </g>
</svg>
