<svg width="860" height="560" viewBox="0 0 860 560" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="skBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="cardStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#1E3A8A" stop-opacity="0.15"/>
    </linearGradient>
    <filter id="skBlur"><feGaussianBlur stdDeviation="26"/></filter>
  </defs>

  <rect width="860" height="560" rx="22" fill="url(#skBg)"/>
  <circle cx="60" cy="60" r="140" fill="#2563EB" opacity="0.28" filter="url(#skBlur)"/>
  <circle cx="800" cy="500" r="160" fill="#38BDF8" opacity="0.25" filter="url(#skBlur)"/>

  <text x="430" y="46" text-anchor="middle" font-family="Verdana, sans-serif" font-size="24" font-weight="700" fill="#E0F2FE">Skills</text>
  <rect x="398" y="58" width="64" height="3" rx="1.5" fill="#38BDF8"/>

  <!-- template macro replicated manually for 8 cards, 4 cols x 2 rows -->
  <!-- row 1 -->
  <g transform="translate(30,80)">
    <rect width="190" height="200" rx="16" fill="white" opacity="0.045" stroke="url(#cardStroke)"/>
    <path d="M30,50 L15,70 L30,90 M60,50 L75,70 L60,90" stroke="#38BDF8" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="95" y="76" font-family="Consolas, monospace" font-size="15" fill="#7DD3FC">Programming</text>
    <g font-family="Verdana, sans-serif" font-size="12.5" fill="#BAE6FD">
      <text x="20" y="120">Java</text>
      <text x="20" y="142">Python</text>
      <text x="20" y="164">C / C++</text>
      <text x="20" y="186">JavaScript</text>
    </g>
  </g>

  <g transform="translate(238,80)">
    <rect width="190" height="200" rx="16" fill="white" opacity="0.045" stroke="url(#cardStroke)"/>
    <rect x="20" y="45" width="52" height="38" rx="4" stroke="#38BDF8" stroke-width="3" fill="none"/>
    <line x1="20" y1="56" x2="72" y2="56" stroke="#38BDF8" stroke-width="2"/>
    <text x="95" y="76" font-family="Consolas, monospace" font-size="15" fill="#7DD3FC">Frontend</text>
    <g font-family="Verdana, sans-serif" font-size="12.5" fill="#BAE6FD">
      <text x="20" y="120">HTML / CSS</text>
      <text x="20" y="142">React</text>
      <text x="20" y="164">JavaScript</text>
    </g>
  </g>

  <g transform="translate(446,80)">
    <rect width="190" height="200" rx="16" fill="white" opacity="0.045" stroke="url(#cardStroke)"/>
    <rect x="24" y="42" width="44" height="16" rx="3" stroke="#38BDF8" stroke-width="2.5" fill="none"/>
    <rect x="24" y="62" width="44" height="16" rx="3" stroke="#38BDF8" stroke-width="2.5" fill="none"/>
    <circle cx="32" cy="50" r="1.6" fill="#38BDF8"/>
    <circle cx="32" cy="70" r="1.6" fill="#38BDF8"/>
    <text x="95" y="76" font-family="Consolas, monospace" font-size="15" fill="#7DD3FC">Backend</text>
    <g font-family="Verdana, sans-serif" font-size="12.5" fill="#BAE6FD">
      <text x="20" y="120">Node.js</text>
      <text x="20" y="142">Express</text>
    </g>
  </g>

  <g transform="translate(654,80)">
    <rect width="190" height="200" rx="16" fill="white" opacity="0.045" stroke="url(#cardStroke)"/>
    <path d="M20,50 a16,10 0 0,1 32,-2 a13,13 0 0,1 2,25.9 h-34 a11,11 0 0,1 0,-23.9 z" stroke="#38BDF8" stroke-width="2.5" fill="none"/>
    <text x="95" y="76" font-family="Consolas, monospace" font-size="15" fill="#7DD3FC">Database</text>
    <g font-family="Verdana, sans-serif" font-size="12.5" fill="#BAE6FD">
      <text x="20" y="120">MongoDB</text>
      <text x="20" y="142">MySQL</text>
    </g>
  </g>

  <!-- row 2 -->
  <g transform="translate(30,300)">
    <rect width="190" height="200" rx="16" fill="white" opacity="0.045" stroke="url(#cardStroke)"/>
    <path d="M22,68 a14,14 0 0,1 26,-9 a11,11 0 0,1 15,10 a10,10 0 0,1 -3,19 h-38 a10,10 0 0,1 0,-20z" stroke="#38BDF8" stroke-width="2.5" fill="none"/>
    <text x="95" y="76" font-family="Consolas, monospace" font-size="15" fill="#7DD3FC">Cloud</text>
    <g font-family="Verdana, sans-serif" font-size="12.5" fill="#BAE6FD">
      <text x="20" y="120">Git / GitHub</text>
      <text x="20" y="142">Linux</text>
    </g>
  </g>

  <g transform="translate(238,300)">
    <rect width="190" height="200" rx="16" fill="white" opacity="0.045" stroke="url(#cardStroke)"/>
    <circle cx="46" cy="65" r="8" stroke="#38BDF8" stroke-width="2.5" fill="none"/>
    <circle cx="22" cy="45" r="4" fill="#38BDF8"/>
    <circle cx="70" cy="45" r="4" fill="#38BDF8"/>
    <circle cx="22" cy="85" r="4" fill="#38BDF8"/>
    <circle cx="70" cy="85" r="4" fill="#38BDF8"/>
    <line x1="40" y1="60" x2="24" y2="47" stroke="#38BDF8" stroke-width="1.6"/>
    <line x1="52" y1="60" x2="68" y2="47" stroke="#38BDF8" stroke-width="1.6"/>
    <line x1="40" y1="70" x2="24" y2="83" stroke="#38BDF8" stroke-width="1.6"/>
    <line x1="52" y1="70" x2="68" y2="83" stroke="#38BDF8" stroke-width="1.6"/>
    <text x="95" y="76" font-family="Consolas, monospace" font-size="15" fill="#7DD3FC">AI / ML</text>
    <g font-family="Verdana, sans-serif" font-size="12.5" fill="#BAE6FD">
      <text x="20" y="120">Machine Learning</text>
      <text x="20" y="142">Data Science</text>
    </g>
  </g>

  <g transform="translate(446,300)">
    <rect width="190" height="200" rx="16" fill="white" opacity="0.045" stroke="url(#cardStroke)"/>
    <path d="M46,40 L64,48 v18 c0,14 -9,22 -18,26 c-9,-4 -18,-12 -18,-26 v-18 z" stroke="#38BDF8" stroke-width="2.5" fill="none"/>
    <text x="95" y="76" font-family="Consolas, monospace" font-size="15" fill="#7DD3FC">Cybersecurity</text>
    <g font-family="Verdana, sans-serif" font-size="12.5" fill="#BAE6FD">
      <text x="20" y="120">Network Security</text>
      <text x="20" y="142">Threat Analysis</text>
    </g>
  </g>

  <g transform="translate(654,300)">
    <rect width="190" height="200" rx="16" fill="white" opacity="0.045" stroke="url(#cardStroke)"/>
    <path d="M28,72 l24,-24 m0,0 a8,8 0 1,0 -11,-11 a8,8 0 0,0 -2,12 z" stroke="#38BDF8" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="95" y="76" font-family="Consolas, monospace" font-size="15" fill="#7DD3FC">Tools</text>
    <g font-family="Verdana, sans-serif" font-size="12.5" fill="#BAE6FD">
      <text x="20" y="120">VS Code</text>
      <text x="20" y="142">Git</text>
    </g>
  </g>

  <g fill="#7DD3FC">
    <circle cx="820" cy="40" r="2"><animate attributeName="opacity" values="1;0.2;1" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="40" cy="540" r="2"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.5s" repeatCount="indefinite"/></circle>
  </g>
</svg>
