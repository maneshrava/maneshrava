<svg width="820" height="170" viewBox="0 0 820 170" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="conBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="conStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#1E3A8A" stop-opacity="0.15"/>
    </linearGradient>
    <filter id="conBlur"><feGaussianBlur stdDeviation="22"/></filter>
  </defs>
  <rect width="820" height="170" rx="18" fill="url(#conBg)"/>
  <circle cx="60" cy="150" r="90" fill="#2563EB" opacity="0.3" filter="url(#conBlur)"/>
  <rect x="14" y="14" width="792" height="142" rx="14" fill="white" opacity="0.045" stroke="url(#conStroke)"/>

  <text x="410" y="52" text-anchor="middle" font-family="Verdana, sans-serif" font-size="20" font-weight="700" fill="#E0F2FE">Let's Connect</text>
