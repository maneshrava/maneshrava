  <g font-family="Consolas, monospace" font-size="13" fill="#7DD3FC">
    <rect x="270" y="100" width="140" height="34" rx="17" fill="#1E3A8A" opacity="0.5" stroke="#38BDF8" stroke-opacity="0.4"/>
    <text x="340" y="122" text-anchor="middle">LinkedIn</text>
    <rect x="420" y="100" width="130" height="34" rx="17" fill="#1E3A8A" opacity="0.5" stroke="#38BDF8" stroke-opacity="0.4"/>
